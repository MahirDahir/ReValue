services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: revalue-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: revalue-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: https://revalue-web.onrender.com
      - key: CLOUDINARY_URL
        sync: false   # set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false   # set manually in Render dashboard

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: revalue-web
    runtime: docker
    dockerfilePath: ./web/Dockerfile
    dockerContext: ./web
    dockerBuildArgs:
      - key: VITE_API_URL
        value: https://revalue-backend.onrender.com/api

# ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: revalue-db
    databaseName: revalue
    user: revalue
