server {
    listen 80;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "DENY"              always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://nominatim.openstreetmap.org; frame-src 'none';" always;

    # Serve the React SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        autoindex off;
    }

    # Proxy API requests to the backend (used in local Docker Compose)
    # In Railway/PaaS, VITE_API_URL points directly to the backend — this block is unused
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Proxy uploaded images to the backend (local Docker Compose only)
    location /uploads {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        autoindex off;
    }
}
